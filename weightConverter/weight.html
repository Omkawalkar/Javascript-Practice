<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="weight.css">
        <title>WEIGHT CONVERTER</title>
    </head>
    <body>
        <h1>WEIGHT CONVERTER POUND TO KG</h1>
        <div class="container">

            <div class="SecoundContainer">

                <div class="Input-Pound">
                    <input type="number" id="pound"
                        placeholder="Enter Weight In Pound">
                </div>

                <div class="Convert-Button">
                    <button id="convert">Cnvert</button>
                </div>

                <div class="Output-Kilogram">
                    <p class="Text">Your Weight In Kg Is <span
                            id="Kilogram-Weight">
                            00</span></p>
                </div>

            </div>

        </div>

        <script src="weight.js"></script>

    </body>
</html>
