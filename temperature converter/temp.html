<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="temp.css">
        <title>Document</title>
    </head>
    <body>
        <h1> Temperature Converter</h1>

        <div class="container">

            <div class="celcius">
                <input id="celsiusInput" type="number" class="CelsiusTOFaren"
                    placeholder="Enter Celsius">

                <button id="convert">Celsius To Farenheit</button>

                <span id="Farenheit">00</span>
            </div>


            <div class="Farenheit">
                <input id="fahrenheitInput" type="number" class="FahrenheitTOCelsius"
                    placeholder="Enter Fahrenheit">

                <button id="convert2">Farenheit To Celsius</button>

                <span id="Celsius">00</span>
            </div>

        </div>

        <script src="temp.js"></script>
    </body>
</html>
