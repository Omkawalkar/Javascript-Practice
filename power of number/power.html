<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Power of a Number</title>
    <link rel="stylesheet" href="power.css" />
</head>
<body>
    <div class="calculator-card">
        <h1>Power Calculator</h1>
        <form class="power-form">
            <label for="base">Number</label>
            <input type="number" id="base" name="base" placeholder="Enter a number" required />

            <label for="exponent">Power</label>
            <input type="number" id="exponent" name="exponent" placeholder="Enter the exponent" required />

            <button type="button" id="Calculate">Calculate</button>
        </form>

        <div class="result-box">
            <span>Result:</span>
            <p id="result">Enter values and press Calculate</p>
        </div>
    </div>
    <script src="power.js"></script>
</body>
</html>
