<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Largest Number Checker</title>
  <link rel="stylesheet" href="checklargest.css" />
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Largest Number</h1>
      <p>Enter two numbers and see which one is larger.</p>

      <div class="input-group">
        <input id="first" type="number" placeholder="First number" />
        <input id="secound" type="number" placeholder="Second number" />
      </div>

      <button id="btn" type="button">Check Largest</button>

      <div class="result-box">
        <span class="result-label">Result</span>
        <span class="result-text">Largest Number</span>
      </div>
    </div>
  </div>
  <script src="checklargest.js"></script>
</body>
</html>
