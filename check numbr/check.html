<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Number Checker</title>
  <link rel="stylesheet" href="check.css" />
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Number Checker</h1>
      <p>Enter a number to check whether it is positive, negative, or zero.</p>

      <label for="numberInput">Enter Number</label>
      <input type="number" id="numberInput" placeholder="Type a number" />

      <button type="button" id="button">Check Number</button>

      <div class="result-box">
        <span class="result-label">Result</span>
        <span class="result-text">Positive / Negative / Zero</span>
      </div>
    </div>
  </div>

  <script src="check.js"></script>
</body>
</html>
